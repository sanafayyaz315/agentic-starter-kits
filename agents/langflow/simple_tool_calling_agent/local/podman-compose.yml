version: "3.8"

services:
  # ── Langflow (UI + Server) ─────────────────────────────────────────
  langflow:
    image: docker.io/langflowai/langflow:1.7.1
    platform: linux/arm64
    ports:
      - "7860:7860"
    environment:
      LANGFLOW_DATABASE_URL: "postgresql://${POSTGRES_USER:-langflow}:${POSTGRES_PASSWORD:-langflow}@postgres:5432/${POSTGRES_DB:-langflow}"
      LANGFLOW_CONFIG_DIR: /var/lib/langflow
      LANGFLOW_SKIP_AUTH_AUTO_LOGIN: "true"
      # Model endpoint — points to Ollama running on the host machine (not in a container)
      OPENAI_API_BASE: "http://host.containers.internal:11434/v1"
      OPENAI_API_KEY: "not-needed"
      OLLAMA_BASE_URL: "http://host.containers.internal:11434"
      # Langfuse tracing
      LANGFUSE_HOST: "http://langfuse:3000"
      LANGFUSE_PUBLIC_KEY: "pk-lf-local-dev"
      LANGFUSE_SECRET_KEY: "sk-lf-local-dev"
    volumes:
      - langflow_data:/var/lib/langflow:Z
    depends_on:
      postgres:
        condition: service_healthy
      langfuse:
        condition: service_started

  # ── PostgreSQL (shared by Langflow and Langfuse) ────────────────────
  postgres:
    image: docker.io/library/postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-langflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-langflow}
      POSTGRES_DB: ${POSTGRES_DB:-langflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data:Z
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-langflow}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Langfuse v2 (Tracing) ──────────────────────────────────────────
  langfuse:
    image: docker.io/langfuse/langfuse:2
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-langflow}:${POSTGRES_PASSWORD:-langflow}@postgres:5432/langfuse"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "local-dev-secret"
      SALT: "local-dev-salt"
      # Headless init — auto-creates org, project, user, and API keys
      LANGFUSE_INIT_ORG_ID: "langflow-org"
      LANGFUSE_INIT_ORG_NAME: "Langflow Agent"
      LANGFUSE_INIT_PROJECT_ID: "langflow-project"
      LANGFUSE_INIT_PROJECT_NAME: "Langflow Agent"
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: "pk-lf-local-dev"
      LANGFUSE_INIT_PROJECT_SECRET_KEY: "sk-lf-local-dev"
      LANGFUSE_INIT_USER_EMAIL: "admin@langflow.local"
      LANGFUSE_INIT_USER_NAME: "admin"
      LANGFUSE_INIT_USER_PASSWORD: "admin123"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  langflow_data:
  postgres_data:
